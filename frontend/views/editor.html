<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraceWrite - Editor</title>
  <link rel="stylesheet" href="/public/css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />

  <style>
    /* ── Scrollable paper canvas ───────────────────────────────── */
    .paper-bg {
      flex: 1;
      overflow-y: auto;
      background: #dde1e7;
      padding: 40px 24px 80px;
    }

    /* ── Single A4 shell that grows with content ───────────────── */
    #editorShell {
      position: relative;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 20mm;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.13);
      box-sizing: border-box;
    }

    /* ── Page-break overlay (pointer-events:none) ──────────────── */
    #pageLineOverlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .pg-break-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      /* dashed via background instead of border so it scales */
      background-image: repeating-linear-gradient(
        to right,
        #94a3b8 0px,
        #94a3b8 8px,
        transparent 8px,
        transparent 16px
      );
      display: flex;
      align-items: center;
    }
    .pg-break-label {
      margin-left: auto;
      margin-right: 0;
      font-size: 9px;
      font-family: system-ui, sans-serif;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #94a3b8;
      background: #fff;
      padding: 0 6px;
    }

    /* ── Quill overrides ───────────────────────────────────────── */
    .ql-toolbar.ql-snow {
      border: none;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .ql-container.ql-snow {
      border: none !important;
      font-size: 16px;
    }
    #singleEditor .ql-editor {
      min-height: 200px;
      padding: 0;
      /* needed so remote-cursor absolute positioning works */
      position: relative;
    }

    /* ── Remote cursors ────────────────────────────────────────── */
    .remote-cursor {
      position: absolute;
      width: 2px;
      pointer-events: none;
      z-index: 20;
      border-radius: 1px;
    }
    .remote-cursor-label {
      position: absolute;
      top: -20px;
      left: 0;
      font-size: 10px;
      font-family: system-ui, sans-serif;
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Actions dropdown (same as before) ─────────────────────── */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background: #f9f9f9;
      min-width: 160px;
      box-shadow: 0 8px 16px rgba(0,0,0,.15);
      z-index: 1000;
    }
    .dropdown-content a { color:#000; padding:12px 16px; text-decoration:none; display:block; }
    .dropdown-content a:hover { background:#f1f1f1; }
    .dropdown:hover .dropdown-content { display:block; }

    /* ── Quill font-picker labels ───────────────────────────────────── */
    /* Without these, the dropdown shows raw class names instead of     */
    /* readable font names, and the preview doesn't render in the font. */
    .ql-font-times   { font-family: 'Times New Roman', Times, serif; }
    .ql-font-arial   { font-family: Arial, Helvetica, sans-serif; }
    .ql-font-georgia { font-family: Georgia, serif; }
    .ql-font-courier { font-family: 'Courier New', Courier, monospace; }
    .ql-font-garamond{ font-family: Garamond, serif; }

    /* Dropdown option labels */
    .ql-picker.ql-font .ql-picker-label[data-value='times']::before,
    .ql-picker.ql-font .ql-picker-item[data-value='times']::before {
      content: 'Times New Roman';
      font-family: 'Times New Roman', Times, serif;
    }
    .ql-picker.ql-font .ql-picker-label[data-value='arial']::before,
    .ql-picker.ql-font .ql-picker-item[data-value='arial']::before {
      content: 'Arial';
      font-family: Arial, Helvetica, sans-serif;
    }
    .ql-picker.ql-font .ql-picker-label[data-value='georgia']::before,
    .ql-picker.ql-font .ql-picker-item[data-value='georgia']::before {
      content: 'Georgia';
      font-family: Georgia, serif;
    }
    .ql-picker.ql-font .ql-picker-label[data-value='courier']::before,
    .ql-picker.ql-font .ql-picker-item[data-value='courier']::before {
      content: 'Courier New';
      font-family: 'Courier New', Courier, monospace;
    }
    .ql-picker.ql-font .ql-picker-label[data-value='garamond']::before,
    .ql-picker.ql-font .ql-picker-item[data-value='garamond']::before {
      content: 'Garamond';
      font-family: Garamond, serif;
    }
    /* Default (no data-value = no custom font selected) */
    .ql-picker.ql-font .ql-picker-label:not([data-value])::before,
    .ql-picker.ql-font .ql-picker-item:not([data-value])::before {
      content: 'Default';
    }

    /* ── Fix: give the font picker a fixed width so long names            */
    /* like "Times New Roman" don't spill outside the button boundary.    */
    .ql-toolbar.ql-snow .ql-picker.ql-font {
      width: 148px;
    }
    .ql-toolbar.ql-snow .ql-picker.ql-font .ql-picker-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 18px; /* leave room for the dropdown arrow */
    }

    /* ── Quill size-picker labels (numeric pt) ─────────────────────── */
    .ql-picker.ql-size { width: 52px; }
    .ql-picker.ql-size .ql-picker-label::before,
    .ql-picker.ql-size .ql-picker-item::before { content: attr(data-value); }
    /* Fallback when no size is set (data-value absent or empty) */
    .ql-picker.ql-size .ql-picker-label:not([data-value])::before,
    .ql-picker.ql-size .ql-picker-item:not([data-value])::before    { content: '12pt'; }

    /* ── toolbarContainer sticky wrapper ────────────────────────────── */
    #toolbarContainer {
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    /* Override Quill's own border since the container provides it */
    #toolbarContainer .ql-toolbar.ql-snow {
      border: none;
      background: transparent;
      position: static;   /* container is sticky, not the toolbar itself */
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">TraceWrite</div>
      <a class="menu-item" href="/dashboard">Home</a>
      <a class="menu-item" href="/projects">Projects</a>
      <a class="menu-item active" href="/editor">Editor</a>
      <a class="menu-item" href="/chat">Chat</a>
      <a class="menu-item" href="/profile">Profile</a>
    </aside>

    <div class="content-wrap" style="height:100vh;overflow:hidden;">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
          <strong>Editor</strong>
          <span id="projectNameDisplay" style="font-weight:bold;color:#3b82f6;"></span>
          <span id="saveStatus" class="badge badge-info">Idle</span>
        </div>
        <div id="actionsContainer" style="display:none;align-items:center;gap:10px;">
          <button id="manualSaveBtn" class="btn btn-primary btn-sm">Save</button>
          <div class="dropdown">
            <button class="btn btn-secondary btn-sm">Actions</button>
            <div class="dropdown-content">
              <a href="#" id="downloadPdfBtn">Download PDF</a>
              <a href="#" id="viewAnalyticsBtn">View Analytics</a>
            </div>
          </div>
        </div>
      </header>

      <main class="page-body" style="padding:0;display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 60px);">

        <!-- Project picker -->
        <section id="projectPicker" class="card" style="max-width:600px;margin:20px auto;">
          <h3>Select a Project</h3>
          <p class="muted">Pick a workspace to open your document editor.</p>
          <div class="row-wrap" style="gap:10px;">
            <select id="projectSelect" style="flex:1;padding:8px;border-radius:4px;border:1px solid #cbd5e1;"></select>
            <button id="openProjectBtn" style="width:auto;">Open Document</button>
          </div>
        </section>

        <!-- Editor workspace -->
        <div id="editorWorkspace" style="display:none;flex-direction:column;height:100%;">
          <!-- Quill toolbar renders here (sticky) -->
          <div id="toolbarContainer" style="flex-shrink:0;"></div>

          <!-- Scrollable paper canvas -->
          <div class="paper-bg">
            <!-- A4 shell — grows with content, page lines overlaid -->
            <div id="editorShell">
              <div id="pageLineOverlay"></div>
              <div id="singleEditor"></div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.14.0/dist/html2pdf.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/common.js"></script>
  <script src="/public/js/editor.js"></script>
</body>
</html>
