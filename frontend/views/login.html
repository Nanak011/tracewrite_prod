<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceWrite - Login</title>
    <link rel="stylesheet" href="../public/css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1>TraceWrite Login</h1>
        <p class="muted">Collaborative academic writing platform</p>

        <form id="loginForm">
          <label>Email</label>
          <input type="email" id="email" required />

          <label>Password</label>
          <input type="password" id="password" required />

          <button type="submit">Login</button>
        </form>

        <form id="mfaForm" style="display:none; margin-top:12px;">
          <label>MFA OTP</label>
          <input type="text" id="mfaOtp" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required />
          <button type="submit">Verify and Login</button>
        </form>

        <form id="forgotPasswordForm" style="display:none; margin-top:12px;">
          <h2>Forgot Password</h2>
          <label>Email</label>
          <input type="email" id="forgotEmail" required />
          <button type="submit" style="margin-top:12px;">Send Reset Code</button>
          <button type="button" id="backToLoginBtn" style="margin-top: 10px;">Back to Login</button>
        </form>

        <form id="resetPasswordForm" style="display:none; margin-top:12px;">
          <h2>Reset Password</h2>
          <p class="muted">Enter the code sent to <span id="resetEmailLabel"></span></p>
          <label>Reset Code</label>
          <input type="text" id="resetOtp" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required />
          <label>New Password</label>
          <input type="password" id="newPassword" minlength="8" required />
          <p class="muted" style="font-size: 0.85em; margin-top: 4px;">
            Must be 8+ characters with uppercase, lowercase, number, and symbol
          </p>
          <button type="submit">Reset Password</button>
          <button type="button" id="backToForgotBtn" style="margin-top:12px;">Back</button>
        </form>

        <div id="authMessage"></div>
        <p class="muted" id="forgotPasswordLink" style="margin-top: 8px;">
          <a href="#" id="forgotPasswordLinkBtn">Forgot password?</a>
        </p>
        <p class="muted">No account? <a href="/register">Register here</a></p>
      </div>
    </div>

    <script src="../public/js/common.js" defer></script>
    <script src="../public/js/login.js" defer></script>
  </body>
</html>
