<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabWrite - Chat</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <style>
      .unread-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #ff4444;
        border-radius: 50%;
        margin-left: 6px;
        vertical-align: middle;
      }
      
      .chat-chip, .chat-thread-item {
        position: relative;
      }
      
      .chat-chip .unread-dot, .chat-thread-item .unread-dot {
        position: absolute;
        right: 8px;
        top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">CollabWrite</div>
        <a class="menu-item" href="/dashboard">Home</a>
        <a class="menu-item" href="/projects">Projects</a>
        <a class="menu-item" href="/editor">Editor</a>
        <a class="menu-item active" href="/chat">Chat</a>
        <a class="menu-item" href="/profile">Profile</a>
      </aside>

      <div class="content-wrap">
        <header class="topbar">
          <strong>Chat</strong>
        </header>

        <main class="page-body">
          <div class="chat-shell">
            <aside class="chat-sidebar">
              <h3 style="margin-top:0;">Conversations</h3>
              <div id="chatCarousel" class="chat-carousel"></div>
              <div id="chatThreadList" class="chat-thread-list"></div>
            </aside>

            <section class="chat-main">
              <div class="chat-main-header">
                <div id="chatThreadTitle"><strong>No conversation selected</strong></div>
                <div id="activeUsers" class="muted"></div>
              </div>
              <div id="chatBox" class="chat-box messenger"></div>
              <div class="row" style="margin:12px; align-items:flex-end; display:flex; gap:8px;">
                <textarea id="chatInput" placeholder="Write message..." rows="1" style="flex:1; resize:none; overflow-y:auto; padding:10px; border-radius:8px; border:1px solid var(--gray-border); font-family:inherit; min-height:40px; max-height:120px;"></textarea>
                <button id="sendChatBtn" style="width:120px; height:40px;">Send</button>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/chat.js"></script>
  </body>
</html>
